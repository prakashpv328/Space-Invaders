<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Space Invaders</title>
        <link rel="stylesheet" href="./styles.css" />
        <link rel="shortcut icon" type="image/x-icon" href="./img/spaceships/spaceship1.png" />
    </head>
    <body>
        <div id="parentDiv">
            <p id="scoreContainer">
              <span>Score:</span> <span id="scoreEl">0</span>
            </p>

            <div id="powerUpTimers">
                <div id="shieldTimer" class="powerUpTimer hidden">
                    <div class="timerIcon">🛡</div>
                    <div class="timerBar">
                        <div class="timerFill shield"></div>
                    </div>
                    <span class="timerText">0s</span>
                </div>

                <div id="machineGunTimer" class="powerUpTimer hidden">
                    <div class="timerIcon">⚡</div>
                    <div class="timerBar">
                        <div class="timerFill machineGun"></div>
                    </div>
                    <span class="timerText">0s</span>
                </div>

                <div id="splitFireTimer" class="powerUpTimer hidden">
                    <div class="timerIcon">⚔</div>
                    <div class="timerBar">
                        <div class="timerFill splitFire"></div>
                    </div>
                    <span class="timerText">0s</span>
                </div>
            </div>

            <button id="pauseToggleBtn" type="button" aria-label="pause or Play">
                <img id="pauseToggleIcon" src="./img/components/pause.png" alt="Pause">
            </button>

            <button id="soundToggleBtn" type="button" aria-label="Sound On">
                <img id="soundToggleIcon" src="./img/components/sound_on.png" alt="Sound On ">
            </button>

            <canvas></canvas>

            <div id="startScreen">

                <button id="settingsButton" aria-label="Open Settings">
                    <img src="./img/components/settings.png" alt="Settings">
                </button>
                
                <div class="screenContent">
                    <h1>Space Invaders</h1>
                    <div id="startButton" class="gameButton">
                        <img src="./img/components/button.png" alt="Start Button">
                        <span>Start</span>
                    </div>

                    <div class="bottomControls">
                        <div class="cornerControl leftCorner">
                            <div class="keyRow">
                                <span class="pixelKey">←</span>
                                <span class="pixelKey">A</span>
                            </div>
                            <p>Move Left</p>
                        </div>

                        <div class="centerControl">
                            <div class="keyRow">
                                <span class="pixelKey">W</span>
                                <span class="pixelKey spaceKey">SPACE</span>
                                <span class="pixelKey">↑</span>
                            </div>
                            <p>Fire</p>
                        </div>

                        <div class="cornerControl rightCorner">
                            <div class="keyRow">
                                <span class="pixelKey">D</span>
                                <span class="pixelKey">→</span>
                            </div>
                            <p>Move Right</p>
                        </div>
                    </div>
                    
                </div>


                <div id="settingsPopup" class="settingsPopup hidden" role="dialog" aria-modal="true" aria-label="Settings">
                    <div class="settingsPanel">
                        <img class="settingsBg" src="./img/components/startScreenBackground.png" alt="Settings Background" />
                        
                        <div class="settingsContent">
                            <h2>Settings</h2>
                            <p>Select Spaceship</p>
                            
                            <div class="shipOptions">
                                <button class="shipOption selected" data-ship="./img/spaceships/spaceship1.png">
                                    <img src="./img/spaceships/spaceship1.png" alt="Ship 1" />
                                </button>
                                <button class="shipOption" data-ship="./img/spaceships/spaceship2.png">
                                    <img src="./img/spaceships/spaceship2.png" alt="Ship 2" />
                                </button>
                                <button class="shipOption" data-ship="./img/spaceships/spaceship3.png">
                                    <img src="./img/spaceships/spaceship3.png" alt="Ship 3" />
                                </button>
                                <button class="shipOption" data-ship="./img/spaceships/spaceship4.png">
                                    <img src="./img/spaceships/spaceship4.png" alt="Ship 4" />
                                </button>
                            </div>

                            <div class="soundSettings">
                                <p>Sound</p>
                                <div class="soundOptions">
                                    <button class="soundOption selected" data-sound="on">On</button>
                                    <button class="soundOption" data-sound="off">Off</button>
                                </div>
                            </div>
                          
                            <div class="settingsActions">
                                <button id="settingsCancel" class="settingsBtn secondary">Cancel</button>
                                <button id="settingsSave" class="settingsBtn primary">Save</button>
                            </div>
                        </div>
                    </div>
                </div>


            </div>

            <div id="restartScreen">
                <div class="screenContent">
                    <h1>Game Over</h1>

                    <div class="gameOverActions">
                        <div id="restartButton" class="gameButton">
                            <img src="./img/components/button.png" alt="Restart Button">
                            <span>Play</span>
                        </div>
    
                        <div id="backToLobbyButton" class="gameButton">
                            <img src="./img/components/button.png" alt="Back To Lobby Buttons">
                            <span>Back to Lobby</span>
                        </div>
                    </div>

                </div>
            </div>

            <div id="victoryScreen">
                <div class="screenContent">
                    <h1>Victory</h1>
                    <p class="victorySub">All Levels Completed!</p>
                    <p class="victoryFinal">Final Score: <span id="victoryScoreEl">0</span></p>
                    
                    <div class="gameOverActions">
                        <div id="victoryPlayAgain" class="gameButton">
                            <img src="./img/components/button.png" alt="Play Again Button">
                            <span>Play Again</span>
                        </div>
                      
                        <div id="victoryBackToLobby" class="gameButton">
                            <img src="./img/components/button.png" alt="Main Menu Button">
                            <span>Main Menu</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>

          <script
            src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"
            integrity="sha512-H6cPm97FAsgIKmlBA4s774vqoN24V5gSQL4yBTDOY2su2DeXZVhQPxFK4P6GPdnZqM9fg1G3cMv5wD7e6cFLZQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer">
          </script>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"
            integrity="sha512-6+YN/9o9BWrk6wSfGxQGpt3EUK6XeHi6yeHV+TYD2GR0Sj/cggRpXr1BrAQf0as6XslxomMUxXp2vIl+fv0QRA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer">
        </script>

        <script src="./audio.js"></script>
        <script src="./js/util.js"></script>
        <script src="./js/classes/Player.js"></script>
        <script src="./js/classes/Projectile.js"></script>
        <script src="./js/classes/Particle.js"></script>
        <script src="./js/classes/InvaderProjectile.js"></script>
        <script src="./js/classes/Invader.js"></script>
        <script src="./js/classes/Grid.js"></script>
        <script src="./js/classes/Bomb.js"></script>
        <script src="./script.js"></script>
    </body>
</html>
